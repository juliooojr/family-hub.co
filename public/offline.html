<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#10110f">
    <title>Family Hub offline</title>
    <style>
      :root{color-scheme:dark;--bg:#10110f;--surface:#20221f;--border:#343830;--text:#f1f2ec;--muted:#a2a69a;--accent:#e8760a}
      *{box-sizing:border-box}
      body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left,rgba(232,118,10,.16),transparent 36%),var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
      main{width:min(420px,100%);padding:28px;border:1px solid var(--border);border-radius:24px;background:var(--surface);box-shadow:0 24px 80px rgba(0,0,0,.34)}
      h1{margin:0 0 12px;font-size:32px;line-height:1;font-weight:900}
      p{margin:0 0 22px;color:var(--muted);line-height:1.55}
      a{display:inline-flex;min-height:42px;align-items:center;justify-content:center;padding:0 16px;border-radius:999px;background:var(--accent);color:white;text-decoration:none;font-weight:700}
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexao agora.</h1>
      <p>O Family Hub precisa da internet para atualizar compras, financas e login com seguranca.</p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
